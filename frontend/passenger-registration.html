<!DOCTYPE html>
<html>
<head>
    <title>Passenger Registration</title>
</head>

<body style="
    margin:0;
    padding:0;
    font-family:Arial, sans-serif;
    background:linear-gradient(135deg,#003366,#00509d);
">

    <!-- Header -->

    <div style="
        background:#001f3f;
        color:white;
        text-align:center;
        padding:20px;
        font-size:30px;
        font-weight:bold;
        letter-spacing:1px;
    ">
        Passenger Management System
    </div>

    <!-- Registration Form -->

    <div style="
        width:700px;
        margin:40px auto;
        background:white;
        padding:30px;
        border-radius:15px;
        box-shadow:0px 0px 20px rgba(0,0,0,0.3);
    ">

        <h2 style="
            text-align:center;
            color:#003366;
            margin-bottom:30px;
        ">
            Passenger Registration
        </h2>

        <form action="RegisterPassengerServlet" method="post">

            <label>PNR Number</label><br>
            <input type="text" name="pnr" required
            style="width:100%;padding:12px;margin-top:5px;margin-bottom:15px;border:1px solid #ccc;border-radius:5px;">

            <label>Passenger Name</label><br>
            <input type="text" name="name" required
            style="width:100%;padding:12px;margin-top:5px;margin-bottom:15px;border:1px solid #ccc;border-radius:5px;">

            <label>Age</label><br>
            <input type="number" name="age" required
            style="width:100%;padding:12px;margin-top:5px;margin-bottom:15px;border:1px solid #ccc;border-radius:5px;">

            <label>Origin</label><br>
            <input type="text" name="origin" required
            style="width:100%;padding:12px;margin-top:5px;margin-bottom:15px;border:1px solid #ccc;border-radius:5px;">

            <label>Destination</label><br>
            <input type="text" name="destination" required
            style="width:100%;padding:12px;margin-top:5px;margin-bottom:15px;border:1px solid #ccc;border-radius:5px;">

            <label>Gender</label><br>
            <select name="gender"
            style="width:100%;padding:12px;margin-top:5px;margin-bottom:15px;border:1px solid #ccc;border-radius:5px;">
                <option>Male</option>
                <option>Female</option>
                <option>Other</option>
            </select>

            <label>Ticket Price</label><br>
            <input type="number" name="ticketPrice" required
            style="width:100%;padding:12px;margin-top:5px;margin-bottom:15px;border:1px solid #ccc;border-radius:5px;">

            <label>Train Number</label><br>
            <input type="text" name="trainNumber" required
            style="width:100%;padding:12px;margin-top:5px;margin-bottom:15px;border:1px solid #ccc;border-radius:5px;">

            <label>Email</label><br>
            <input type="email" name="email" required
            style="width:100%;padding:12px;margin-top:5px;margin-bottom:15px;border:1px solid #ccc;border-radius:5px;">

            <label>Password</label><br>
            <input type="password" name="password" required
            style="width:100%;padding:12px;margin-top:5px;margin-bottom:25px;border:1px solid #ccc;border-radius:5px;">

            <button type="submit"
            style="
                width:100%;
                padding:15px;
                background:#28a745;
                color:white;
                border:none;
                border-radius:8px;
                font-size:18px;
                cursor:pointer;
                font-weight:bold;
            ">
                Register Passenger
            </button>

        </form>

        <div style="text-align:center;margin-top:20px;">
            <a href="index.html"
            style="
                text-decoration:none;
                color:#003366;
                font-weight:bold;
            ">
                ← Back to Home
            </a>
        </div>

    </div>

</body>
</html>
