<!DOCTYPE html>
<html>
<head>
    <title>Admin Login</title>
</head>

<body style="
margin:0;
padding:0;
font-family:Arial, sans-serif;
background:linear-gradient(135deg,#1e3c72,#2a5298);
">

<div style="
background:#001f3f;
color:white;
text-align:center;
padding:20px;
font-size:30px;
font-weight:bold;
">
Passenger Management System
</div>

<div style="
width:450px;
margin:80px auto;
background:white;
padding:35px;
border-radius:15px;
box-shadow:0 0 20px rgba(0,0,0,0.3);
">

<h2 style="
text-align:center;
color:#003366;
margin-bottom:25px;
">
Admin Login
</h2>

<form action="LoginServlet" method="post">

<label>Email</label>
<input type="email" name="email" required
style="
width:100%;
padding:12px;
margin-top:5px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:5px;
box-sizing:border-box;
">

<label>Password</label>
<input type="password" name="password" required
style="
width:100%;
padding:12px;
margin-top:5px;
margin-bottom:25px;
border:1px solid #ccc;
border-radius:5px;
box-sizing:border-box;
">

<button type="submit"
style="
width:100%;
padding:15px;
background:#dc3545;
color:white;
border:none;
border-radius:8px;
font-size:18px;
font-weight:bold;
cursor:pointer;
">
Login
</button>

</form>

<div style="
text-align:center;
margin-top:20px;
">
<a href="index.html"
style="
text-decoration:none;
font-weight:bold;
color:#003366;
">
← Back to Home
</a>
</div>

</div>

</body>
</html>
