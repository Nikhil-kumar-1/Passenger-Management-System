<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>
</head>

<body style="
margin:0;
padding:0;
font-family:Arial, sans-serif;
background:#f4f6f9;
">

<!-- Header -->

<div style="
background:#001f3f;
color:white;
padding:20px;
display:flex;
justify-content:space-between;
align-items:center;
">

    <h2 style="margin:0;">
        Passenger Management System
    </h2>

    <a href="index.html">
        <button style="
        background:#dc3545;
        color:white;
        border:none;
        padding:10px 20px;
        border-radius:5px;
        cursor:pointer;
        ">
        Logout
        </button>
    </a>

</div>

<!-- Welcome Section -->

<div style="
padding:30px;
text-align:center;
">

    <h1 style="color:#003366;">
        Welcome Admin
    </h1>

    <p>
        Manage Passenger Records Efficiently
    </p>

</div>

<!-- Dashboard Cards -->

<div style="
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:25px;
padding:20px;
">

    <!-- Add Passenger -->

    <div style="
    width:250px;
    background:white;
    padding:25px;
    border-radius:12px;
    text-align:center;
    box-shadow:0 0 15px rgba(0,0,0,0.2);
    ">

        <h3>Add Passenger</h3>

        <p>
            Register New Passenger
        </p>

        <a href="passenger-registration.html">
            <button style="
            background:#28a745;
            color:white;
            border:none;
            padding:10px 20px;
            border-radius:5px;
            cursor:pointer;
            ">
                Open
            </button>
        </a>

    </div>

    <!-- View Passenger -->

    <div style="
    width:250px;
    background:white;
    padding:25px;
    border-radius:12px;
    text-align:center;
    box-shadow:0 0 15px rgba(0,0,0,0.2);
    ">

        <h3>View Passengers</h3>

        <p>
            Display All Passenger Records
        </p>

        <button style="
        background:#007bff;
        color:white;
        border:none;
        padding:10px 20px;
        border-radius:5px;
        cursor:pointer;
        ">
            View
        </button>

    </div>

    <!-- Search Passenger -->

    <div style="
    width:250px;
    background:white;
    padding:25px;
    border-radius:12px;
    text-align:center;
    box-shadow:0 0 15px rgba(0,0,0,0.2);
    ">

        <h3>Search Passenger</h3>

        <p>
            Search Using PNR Number
        </p>

        <button style="
        background:#ffc107;
        color:black;
        border:none;
        padding:10px 20px;
        border-radius:5px;
        cursor:pointer;
        ">
            Search
        </button>

    </div>

    <!-- Delete Passenger -->

    <div style="
    width:250px;
    background:white;
    padding:25px;
    border-radius:12px;
    text-align:center;
    box-shadow:0 0 15px rgba(0,0,0,0.2);
    ">

        <h3>Delete Passenger</h3>

        <p>
            Remove Passenger Record
        </p>

        <button style="
        background:#dc3545;
        color:white;
        border:none;
        padding:10px 20px;
        border-radius:5px;
        cursor:pointer;
        ">
            Delete
        </button>

    </div>

</div>

<!-- Footer -->

<div style="
margin-top:60px;
background:#001f3f;
color:white;
text-align:center;
padding:15px;
">

© 2026 Passenger Management System

</div>

</body>
</html>
